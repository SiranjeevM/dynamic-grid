<h2>Students By Department</h2>
 
<table border="1">
 
  <tr>
    <th>Department</th>
    <th>Total Students</th>
  </tr>
 
  <tr *ngFor="let item of chartData">
 
    <td>{{ item.label }}</td>
 
    <td>{{ item.value }}</td>
 
  </tr>
 
</table>
